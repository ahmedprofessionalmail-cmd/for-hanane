<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Hanane</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #fff5f5;
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d16262;
            text-align: center;
            margin-top: 30px;
            font-size: 2.2rem;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            margin-bottom: 40px;
            color: #8c7a7a;
        }

        .gallery {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(209, 98, 98, 0.1);
            border: 1px solid #ffe3e3;
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
        }

        .caption {
            margin-top: 15px;
            font-size: 1.1rem;
            line-height: 1.5;
            text-align: center;
            font-weight: bold;
        }

        .proposal-card {
            border: 2px dashed #d16262;
            background-color: #fffbbfb;
        }

        .music-btn {
            display: inline-block;
            margin: 40px auto;
            padding: 15px 30px;
            background-color: #d16262;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(209, 98, 98, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .music-btn:hover {
            background-color: #b54c4c;
            transform: scale(1.05);
        }

        footer {
            margin-top: 60px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #a19292;
        }
    </style>
</head>
<body>

    <h1>A Journey of Us</h1>
    <div class="subtitle">Press play below to open our song, then scroll down...</div>

    <a href="https://youtu.be/rtOvBOTyX00?si=SYEXw2GeCSYkqOUa" target="_blank" class="music-btn">🎵 Press to Play Our Song</a>

    <div class="gallery">

        <div class="card">
            <img src="step1.jpeg" alt="Step 1">
            <div class="caption">Step 1: The very beginning of our beautiful story.</div>
        </div>

        <div class="card">
            <img src="step2.jpeg" alt="Step 2">
            <div class="caption">Step 2: Growing closer with every single day.</div>
        </div>

        <div class="card">
            <img src="step3.jpeg" alt="Step 3">
            <div class="caption">Step 3: Creating memories that will last a lifetime.</div>
        </div>

        <div class="card proposal-card">
            <img src="proposal.jpeg" alt="Will you marry me?">
            <div class="caption" style="color: #d16262; font-size: 1.3rem;">Hanane, will you marry me? 💍</div>
        </div>

    </div>

    <footer>Made with ❤️ for Hanane</footer>

</body>
</html>
